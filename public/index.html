<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Strategy</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="setupScreen">
        <div class="panel">
            <h2>Создать страну</h2>
            <input type="text" id="countryName" placeholder="Название страны" maxlength="15">
            <br><br>
            <label>Цвет на карте:</label>
            <input type="color" id="countryColor" value="#ff0000">
            <br><br>
            <button id="joinBtn">Начать игру</button>
        </div>
    </div>

    <div id="ui" style="display: none;">
        <h3><span id="myName"></span></h3>
        <p>Территория: <span id="myScore">0</span> км²</p>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script src="/socket.io/socket.io.js"></script>
    <script src="game.js"></script>
</body>
</html>

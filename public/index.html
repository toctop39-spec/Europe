<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Глобальная Стратегия</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="setupScreen">
        <div class="panel">
            <h2>Основать государство</h2>
            <input type="text" id="countryName" placeholder="Название страны" maxlength="20">
            <br><br>
            <label>Цвет территории:</label>
            <input type="color" id="countryColor" value="#ff0000">
            <br><br>
            <button id="joinBtn">Начать игру</button>
        </div>
    </div>

<div id="ui" style="display: none;">
        <h3 id="myName"></h3>
        <p>Площадь: <span id="myArea">0</span> км²</p>
        <p style="color: gold;">Казна: <span id="myGold">0</span> 🪙</p>
        <hr style="border-color: #555;">
        <p id="gameHint" style="font-size: 14px; color: #aaa;">Кликни по карте, чтобы основать столицу.</p>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script src="/socket.io/socket.io.js"></script>
    <script src="game.js"></script>
</body>
</html>

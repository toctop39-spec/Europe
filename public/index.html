<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Strategy Engine</title>
    <link rel="stylesheet" href="style.css">
</head>
<body oncontextmenu="return false;">
    <div id="setupScreen">
        <div class="panel">
            <h2>Выбор государства</h2>
            <select id="countrySelect" style="width: 100%; padding: 10px; margin-bottom: 15px; background: #222; color: white; border: 1px solid #555; font-size: 16px;">
                <option value="new">-- Основать новую страну --</option>
            </select>
            
            <div id="newCountryForm">
                <input type="text" id="countryName" placeholder="Название страны" maxlength="20">
                <br><br>
                <label style="display: block; margin-bottom: 5px;">Флаг страны (Картинка):</label>
                <input type="file" id="countryFlagFile" accept="image/*" style="width: 100%; background: #222; color: white; border: 1px solid #555; padding: 5px; margin-bottom: 15px;">
                
                <label>Цвет на карте:</label>
                <input type="color" id="countryColor" value="#2b5e8a">
                <br><br>
            </div>
            
            <button id="joinBtn">Войти в игру</button>
        </div>
    </div>

    <div id="topBar" style="display: none;">
        <div class="stat"><img id="myFlagUI" style="width: 22px; height: 22px; border-radius: 50%; vertical-align: middle; margin-right: 5px; border: 1px solid #fff;"> <span id="myName"></span></div>
        <div class="stat text-green">Доллары: <span id="myDollars">0</span> $ (<span id="myIncome">0</span>/с)</div>
        <div class="stat text-red">Военная сила: <span id="myMilitary">0</span> / <span id="myCap">0</span></div>
        <div class="stat">Территория: <span id="myArea">0</span> км²</div>
    </div>

    <div id="controlPanel" style="display: none;">
        <h3>Управление</h3>
        <button id="drawRegionBtn" class="btn-civil">Новый регион (Обвести)</button>
        <button id="disbandBtn" class="btn-disband" style="display: none;">Распустить армию</button>
        <p id="systemMsg" class="sys-msg">Управление камерой: W A S D</p>
    </div>

<div id="regionPanel" style="display: none;">
        <div style="display: flex; align-items: center; justify-content: space-between;">
            <h3 id="regName" style="margin: 0;">Регион</h3>
            <button id="renameRegBtn" style="background: none; border: 1px solid #555; color: #aaa; cursor: pointer; font-size: 10px;">✏️</button>
        </div>
        <p>Принадлежит: <span id="regOwner"></span></p>
        <p>Экономика: ур. <span id="regLevel">1</span>/10 (<span id="regIncome"></span> $/с)</p>
        <p>Оборона: ур. <span id="regDefLevel">0</span>/10 (Урон: <span id="regDefDmg">0</span>/с)</p>
        
        <button id="upgradeBtn" class="btn-civil" style="background:#27ae60; margin-bottom: 5px;">Улучшить ВВП</button>
        <button id="upgradeDefBtn" class="btn-civil" style="background:#c0392b; margin-bottom: 15px;">Улучшить Защиту</button>
        
        <hr style="border-color: #444; margin: 10px 0;">
        <p style="font-size: 12px; color: #aaa;">Развернуть войска:</p>
        <input type="number" id="deployAmount" value="1000" min="100" step="100" style="width: 100%; box-sizing: border-box; margin-bottom: 5px;">
        <button id="deployBtn" class="btn-military">Развернуть дивизию</button>
        <button id="closeRegBtn" class="btn-close">Закрыть</button>
    </div>

    <canvas id="gameCanvas"></canvas>
    <script src="/socket.io/socket.io.js"></script>
    <script src="game.js"></script>
</body>
</html>
